<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porra Mundial 2026</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

    <div class="overlay"></div>

   

    <header>
        <h1 class="hero-title">PORRA MUNDIAL</h1>
        <p class="hero-subtitle">Compite con tus amigos y demuestra quién sabe más de fútbol</p>
    </header>

    <main>

        <section class="card alias-card">
            <h2>Tu usuario</h2>
            <input type="text" id="aliasInput" placeholder="Escribe tu nombre o alias">
            <button id="saveAliasBtn">Guardar usuario</button>
            <p id="currentUser"></p>
        </section>

        <section class="card">
            <h2>Partidos fase de grupos</h2>
            <div id="matchesContainer"></div>
        </section>

        <section class="card">
            <h2>Clasificación</h2>
            <table>
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Puntos</th>
                    </tr>
                </thead>
                <tbody id="rankingBody"></tbody>
            </table>
        </section>

        <section class="card">
            <h2>Pronósticos de los usuarios</h2>
            <table>
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Pronóstico</th>
                        <th>Puntos</th>
                    </tr>
                </thead>
                <tbody id="predictionsTable"></tbody>
            </table>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app.js"></script>

</body>
</html>
